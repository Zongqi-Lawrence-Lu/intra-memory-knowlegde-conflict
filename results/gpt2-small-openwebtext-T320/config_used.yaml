model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  n_positions: 512
  vocab_size: 50257
  resid_pdrop: 0.1
  embd_pdrop: 0.1
  attn_pdrop: 0.1
optim:
  lr: 0.0006
  weight_decay: 0.01
  beta1: 0.9
  beta2: 0.95
  eps: 1.0e-06
  grad_clip: 0.5
  warmup_steps: 2000
  max_steps: 61035
  lr_schedule: cosine
  min_lr_ratio: 0.1
data:
  train_path: data/processed/full-run-T320
  val_path: data/processed/held-out-wikitext-val
  batch_size: 128
  grad_accum_steps: 1
  num_workers: 2
  shuffle: true
  overlapping: true
  min_corpus_tokens: 4000000000
checkpoint:
  sparse_interval_steps: 3400
  num_checkpoint_slots: 3
  injection_steps: []
  occurrence_log_path: null
  dense_interval_steps: 75
  dense_window_steps: 375
stability:
  spike_skip_multiplier: 4.0
  spike_rolling_window: 50
  spike_min_history: 20
  rollback_val_ppl_multiplier: 2.0
  rollback_patience_evals: 3
  max_rollbacks: 5
  rollback_lr_decay: 0.7
  min_lr_penalty: 0.1
  stop_on_exhausted_rollbacks: true
eval:
  eval_interval_steps: 188
  eval_batches: 50
run:
  run_name: gpt2-small-openwebtext-T320
  seed: 0
  output_dir: output
  results_dir: results
  device: cuda
  dtype: bfloat16
  log_interval_steps: 20
  resume: true
  compile: true
