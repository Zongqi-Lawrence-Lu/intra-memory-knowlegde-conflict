# GPT-2-small-from-scratch default config, per experimental_plans.tex §1.
# batch_size=192 (not the Physics of Language Models 3.1 anchor of 48) for A100
# GPU utilization; lr/warmup_steps/max_steps and the checkpoint/eval intervals
# below are all re-derived from that batch size to hold total training tokens
# (2.5e9) and every interval's *token*-space cadence fixed -- see the defaults
# and comments in training/config.py for the exact derivation of each number,
# and experimental_plans.tex's Optimization-section revision note for the
# scientific-tradeoff writeup (this is the one hyperparameter that now departs
# from the reference setup for engineering reasons).

model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  n_positions: 512
  vocab_size: 50257

optim:
  lr: 1.2e-3
  weight_decay: 0.01
  warmup_steps: 500
  max_steps: 25425
  lr_schedule: cosine
  min_lr_ratio: 0.1
  grad_clip: 1.0

data:
  train_path: null   # set once preprocess/ (M2) emits packed shards; null -> dummy data
  val_path: null
  batch_size: 192
  grad_accum_steps: 1
  num_workers: 2

checkpoint:
  sparse_interval_steps: 1200   # provisional -- re-tune once real throughput is measured, see training/README.md
  keep_last_n_sparse: 3
  injection_steps: []          # filled in once the M2 insertion schedule exists
  dense_interval_steps: 50
  dense_window_steps: 250
  dense_full_weight_first_k: 2
  dense_full_weight_sample_rate: 0.1

eval:
  eval_interval_steps: 125
  eval_batches: 50

run:
  run_name: gpt2-small-dev
  seed: 0
  output_dir: output
  results_dir: results
  device: cuda
  dtype: bfloat16
  log_interval_steps: 20
  resume: true
  compile: true   # torch.compile(raw_model) on CUDA; flip to false if it breaks on first real run
