# Full-scale (real target) GPT-2-small config used to validate the training
# pipeline end to end -- checkpoint save/rotation, eval loop, logging, resume --
# at the actual parameter scale we intend to train at, reading the real dev-scale
# corpus (data/processed/dev-run: WikiText-103 backbone + real LLM-authored
# vignette occurrences, preprocess/assemble_corpus.py --total-tokens 200000).
# NOT a real training run: max_steps/intervals are trimmed so a handful of
# checkpoint+eval cycles fire within a short GPU allocation. Model/optim
# parameters otherwise mirror configs/default.yaml exactly.
#
# injection_steps is deliberately left empty: mapping an occurrence's token
# position (results/occurrence_log.json) to a training step assumes the loader
# visits positions in a known order, but train.py's DataLoader uses shuffle=True
# (random windows), so no such mapping actually holds as implemented. Left as an
# open design question rather than papered over with a fake step count.

model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  n_positions: 512
  vocab_size: 50257

optim:
  lr: 1.2e-3   # mirrors default.yaml's batch_size=192-adjusted lr (sqrt-scaling, see training/config.py)
  weight_decay: 0.01
  warmup_steps: 20
  max_steps: 150
  lr_schedule: cosine
  min_lr_ratio: 0.1
  grad_clip: 1.0

data:
  train_path: data/processed/dev-run   # real assembled corpus (backbone + vignettes)
  val_path: null   # no separate held-out shard yet -- falls back to train_path
  batch_size: 192   # mirrors default.yaml -- also exercises the same memory footprint as a real run
  grad_accum_steps: 1
  num_workers: 2

checkpoint:
  sparse_interval_steps: 50   # shrunk from default.yaml's 1200 so save+rotation actually fire
  keep_last_n_sparse: 3
  injection_steps: []
  dense_interval_steps: 50
  dense_window_steps: 250
  dense_full_weight_first_k: 2
  dense_full_weight_sample_rate: 0.1

eval:
  eval_interval_steps: 50   # shrunk from default.yaml's 125 for the same reason
  eval_batches: 50

run:
  run_name: gpt2-small-pipeline-test
  seed: 0
  output_dir: output
  results_dir: results
  device: cuda
  dtype: bfloat16
  log_interval_steps: 10
  resume: true
  compile: true   # this run IS the intended place to first verify torch.compile + checkpoint resume together
