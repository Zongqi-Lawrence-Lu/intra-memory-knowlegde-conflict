# Exposure-budget pilot (experimental_plans.tex Sec. seeds): T=320 condition.
# Same architecture/optim/token-budget as full_run.yaml (T=80 baseline) -- only the
# corpus differs (results/population_T320.json's rescaled n_a/n_b, same entities/
# values/vignettes, preprocess/rescale_population.py), isolating T as the swept
# variable.
#
# Checkpointing now always overwrites a single latest/ slot (training/checkpoint.py
# -- supersedes the old per-run keep_last_n_sparse/dense-stratified-retention
# design), so no per-sweep-condition storage tuning is needed here anymore.
# checkpoint.occurrence_log_path is left UNSET (unlike full_run.yaml, pre-fix) since
# dense checkpointing's fine-grained metrics timeline isn't needed for this pilot.
#
# REVISION (2026-07-08): data.shuffle/overlapping flipped False -> True (standard
# shuffled/overlapping-window training), reverting the prior sequential-consumption
# setting. That setting's own justification ("training-quality benefit established
# in full_run.yaml") turned out to have no supporting evidence anywhere in this
# repo, and comparison against Allen-Zhu & Li's own methodology (arXiv 2404.05405,
# read directly -- see conversation record) shows nothing resembling sequential,
# non-shuffled training anywhere in their setup: their bioS(N) data is generated
# fresh per exposure (no fixed order to begin with), their materialized corpus is
# explicitly "randomly concatenated," and their own robustness check (identical
# results across batch sizes from 1 to 1536 and GPU counts from 48 to 1536) is only
# explicable under random/shuffled sampling. Combined with the same-day fix to the
# label-shift bug in training/train.py + training/eval.py (see those files' own
# revision comments), this checkpoint is being fully retrained from scratch, not
# warm-started -- run_name changed accordingly (below) so a resumed run cannot
# silently pick up the old, doubly-wrong checkpoint.

model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  n_positions: 512
  vocab_size: 50257

optim:
  lr: 9.8e-4
  weight_decay: 0.01
  warmup_steps: 750
  max_steps: 38146
  lr_schedule: cosine
  min_lr_ratio: 0.1
  grad_clip: 1.0

data:
  train_path: data/processed/full-run-T320
  val_path: data/processed/held-out-wikitext-val
  batch_size: 128
  grad_accum_steps: 1
  num_workers: 2
  shuffle: true
  overlapping: true

checkpoint:
  sparse_interval_steps: 3400
  injection_steps: []
  dense_interval_steps: 75
  dense_window_steps: 375

eval:
  eval_interval_steps: 188
  eval_batches: 50

run:
  run_name: gpt2-small-openwebtext-T320-shuffled
  seed: 0
  output_dir: output
  results_dir: results
  device: cuda
  dtype: bfloat16
  log_interval_steps: 20
  resume: true
  compile: true
