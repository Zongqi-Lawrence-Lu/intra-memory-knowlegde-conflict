# T=320 condition, stability-hardened pipeline (2026-07-09). See
# full_run_T80.yaml's header for the full rationale (checkpoint.
# num_checkpoint_slots rotating slots + stability spike-guard/rollback,
# training/checkpoint.py + training/config.py:StabilityConfig). The T=320
# condition (gpt2-small-openwebtext-T320-shuffled) actually trained cleanly
# start to finish under the old single-slot pipeline -- unlike T=80/T=1280, it
# never hit the loss-spike failure mode. It is being restarted under this same
# stable pipeline anyway, for consistency across the full T-sweep (same
# checkpoint/eval code path for every condition, explicit user request) rather
# than leaving T=320 on the old pipeline while T=80/T=1280 move to the new one.
# run_name changed (...-T320-shuffled -> ...-T320-stable); the old run's
# checkpoint/results were deleted before this resubmission.
#
# 2026-07-09 second revision: see full_run_T80.yaml's header for the full
# rationale (lr/warmup/grad_clip/eps change + rollback-LR-decay/stop-on-exhaust
# fix in training/config.py:StabilityConfig). T320 itself trained clean under the
# first "-stable" revision, but is being restarted under this one anyway for
# hyperparameter consistency across the T-sweep (explicit user request) rather
# than leaving T320 on different lr/warmup/grad_clip than T80/T1280. Old run's
# metrics moved to results/gpt2-small-openwebtext-T320-stable-diverged-20260709/
# (T320 didn't actually diverge, but kept alongside the other two for a
# consistent naming/audit trail) so this run_name's train_metrics.jsonl starts
# clean rather than mixing old/new step numbers.
#
# 2026-07-10: run_name dropped the "-stable" suffix entirely (gpt2-small-
# openwebtext-T320-stable -> gpt2-small-openwebtext-T320) -- there is now only
# one T=320 run script/config, so "-stable" no longer disambiguates anything.
# Also fixed a real bug found in the same pass: optim.lr was written as
# bare-exponent `6e-4`, which PyYAML's safe_load parses as the *string* '6e-4'
# (not a float) unless it contains a literal decimal point -- this crashed all
# three T-sweep training jobs (986436/986438/986440) instantly in
# torch.optim.AdamW's `0.0 <= lr` check. Now written as `6.0e-4`.

model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  n_positions: 512
  vocab_size: 50257

optim:
  lr: 6.0e-4
  weight_decay: 0.01
  eps: 1.0e-6
  warmup_steps: 2000
  max_steps: 61035  # floor(4e9 / (128*512)) -- one pass over the full 4B-token corpus
  lr_schedule: cosine
  min_lr_ratio: 0.1
  grad_clip: 0.5

data:
  train_path: data/processed/full-run-T320
  val_path: data/processed/held-out-wikitext-val
  batch_size: 128
  grad_accum_steps: 1
  num_workers: 2
  shuffle: true
  overlapping: true
  min_corpus_tokens: 4000000000  # fail fast if the 4B-token assembly stage came up short

checkpoint:
  sparse_interval_steps: 3400
  injection_steps: []
  dense_interval_steps: 75
  dense_window_steps: 375
  num_checkpoint_slots: 3

stability:
  spike_skip_multiplier: 4.0
  spike_rolling_window: 50
  spike_min_history: 20
  rollback_val_ppl_multiplier: 2.0
  rollback_patience_evals: 3
  max_rollbacks: 5

eval:
  eval_interval_steps: 188
  eval_batches: 50

run:
  run_name: gpt2-small-openwebtext-T320
  seed: 0
  output_dir: output
  results_dir: results
  device: cuda
  dtype: bfloat16
  log_interval_steps: 20
  resume: true
  compile: true
