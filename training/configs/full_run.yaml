# Real, full-scale training run (experimental_plans.tex S1) -- identical to
# default.yaml except train_path/run_name, which default.yaml leaves as
# placeholders (null / "gpt2-small-dev") pending the real corpus. Points at
# data/processed/full-run, built by slurm/assemble_full_openwebtext_corpus.sbatch.
#
# Per this session's explicit decision: submitted without first running the
# exposure-budget pilot (experimental_plans.tex S1.11) that's supposed to validate
# T=80 before a full-scale run -- accepted risk, not an oversight. T=80 is a
# reasoned-but-unvalidated working estimate (S1.11); this run's logit-gap/
# calibration curve (S1.6) should be inspected once results are in, same as the
# pilot itself would have inspected, just after spending the full run instead of
# before.
#
# run_name history: gpt2-small-baseline-openwebtext-t80 (original shuffle=True/
# overlapping=True regime) -> gpt2-small-openwebtext-t80-sequential (once flipped to
# shuffle=False/overlapping=False for injection_steps support) -> now
# gpt2-small-openwebtext-t80-shuffled (below), reverting to shuffle=True/
# overlapping=True.
#
# REVISION (2026-07-08): data.shuffle/overlapping flipped back False -> True. The
# sequential-consumption regime's own justification never had supporting evidence
# in this repo (see the T160/320/640/1280 configs' matching revision notes), and
# direct comparison against Allen-Zhu & Li's own methodology (arXiv 2404.05405)
# shows nothing resembling sequential, non-shuffled training anywhere in their
# setup -- their bioS(N) data is generated fresh per exposure with no fixed order
# at all, their materialized corpus is explicitly "randomly concatenated," and
# their own batch-size/GPU-count invariance check is only explicable under
# random/shuffled sampling. occurrence_log_path (below) is now unset: under
# shuffle=True/overlapping=True, an occurrence's token position no longer maps to
# a fixed training step (training/injection_schedule.py's own docstring), so
# auto-deriving injection_steps from it is meaningless -- train.py would only warn
# and skip derivation if left set, so it's removed here rather than left as dead
# config. Combined with the same-day fix to the label-shift bug in
# training/train.py + training/eval.py, this run is being fully retrained from
# scratch, not warm-started -- run_name changed accordingly so a resumed run
# cannot silently pick up the old, doubly-wrong checkpoint.

model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  n_positions: 512
  vocab_size: 50257

optim:
  lr: 9.8e-4
  weight_decay: 0.01
  warmup_steps: 750
  max_steps: 38146
  lr_schedule: cosine
  min_lr_ratio: 0.1
  grad_clip: 1.0

data:
  train_path: data/processed/full-run
  val_path: data/processed/held-out-wikitext-val   # real held-out WikiText-103 val split (preprocess/assemble_held_out.py), not a train_path fallback
  batch_size: 128
  grad_accum_steps: 1
  num_workers: 2
  shuffle: true          # standard shuffled sampling (2026-07-08 revision -- see header note)
  overlapping: true      # standard overlapping windows, resampled with replacement across epochs

checkpoint:
  sparse_interval_steps: 3400   # ~30min crash-loss bound at REAL measured throughput (~125,000 tok/s steady-state, results/gpt2-small-baseline-openwebtext-t80/train_metrics.jsonl) -- 1800s*125,000/65,536 tok-per-step ~= 3433, rounded down. See experimental_plans.tex's checkpointing-section revision note.
  injection_steps: []          # occurrence_log_path removed (2026-07-08) -- meaningless under shuffle=True/overlapping=True, see header note
  dense_interval_steps: 75
  dense_window_steps: 375

eval:
  eval_interval_steps: 188
  eval_batches: 50

run:
  run_name: gpt2-small-openwebtext-t80-shuffled
  seed: 0
  output_dir: output
  results_dir: results
  device: cuda
  dtype: bfloat16
  log_interval_steps: 20
  resume: true
  compile: true   # torch.compile(raw_model) on CUDA; flip to false if it breaks
