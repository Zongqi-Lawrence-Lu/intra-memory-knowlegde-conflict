# T=1280 condition, stability-hardened pipeline (2026-07-09). See
# full_run_T80.yaml's header for the full rationale (same
# checkpoint.num_checkpoint_slots / stability revision, applied identically here)
# -- gpt2-small-openwebtext-T1280-shuffled hit its own irrecoverable loss spike
# around step 17000-18000 (val_ppl ~80 -> ~4700-4900, never recovered). Only the
# corpus (results/gpt2-small-openwebtext-T1280/population.json's rescaled n_a/n_b,
# same entities/values/vignettes) differs from the T=80 stable config. run_name changed
# (...-T1280-shuffled -> ...-T1280-stable) so resume:true has nothing from the
# old, diverged run to silently pick up.
#
# 2026-07-09 second revision, after this run_name's own first "-stable" attempt
# (checkpoint rotation + spike-guard/rollback alone) still diverged. See
# full_run_T80.yaml's header for the full rationale (lr/warmup/grad_clip/
# eps change + rollback-LR-decay/stop-on-exhaust fix in training/config.py:
# StabilityConfig). Old run's metrics moved to results/gpt2-small-openwebtext-
# T1280-stable-diverged-20260709/ so this run_name's train_metrics.jsonl starts
# clean rather than mixing old/new step numbers.
#
# 2026-07-10: run_name dropped the "-stable" suffix entirely (gpt2-small-
# openwebtext-T1280-stable -> gpt2-small-openwebtext-T1280) -- there is now
# only one T=1280 run script/config, so "-stable" no longer disambiguates
# anything. Also fixed a real bug found in the same pass: optim.lr was written
# as bare-exponent `6e-4`, which PyYAML's safe_load parses as the *string*
# '6e-4' (not a float) unless it contains a literal decimal point -- this
# crashed all three T-sweep training jobs (986436/986438/986440) instantly in
# torch.optim.AdamW's `0.0 <= lr` check. Now written as `6.0e-4`.

model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  n_positions: 512
  vocab_size: 50257

optim:
  lr: 6.0e-4
  weight_decay: 0.01
  eps: 1.0e-6
  warmup_steps: 2000
  max_steps: 61035  # floor(4e9 / (128*512)) -- one pass over the full 4B-token corpus
  lr_schedule: cosine
  min_lr_ratio: 0.1
  grad_clip: 0.5

data:
  train_path: data/processed/full-run-T1280
  # In-domain OpenWebText, NOT WikiText -- see full_run_T80.yaml's data: block
  # comment for the full rationale (this drives periodic val_ppl logging,
  # spike-guard rollback, and best-checkpoint selection, so it must track the
  # actual training distribution). WikiText-103 remains an explicit post-hoc
  # OOD diagnostic only, via slurm/run_T1280.sbatch's second held_out_ppl call.
  val_path: data/processed/held-out-openwebtext-val
  batch_size: 128
  grad_accum_steps: 1
  num_workers: 2
  shuffle: true
  overlapping: true
  min_corpus_tokens: 4000000000  # fail fast if the 4B-token assembly stage came up short

checkpoint:
  sparse_interval_steps: 3400
  injection_steps: []
  dense_interval_steps: 75
  dense_window_steps: 375
  num_checkpoint_slots: 3

stability:
  spike_skip_multiplier: 4.0
  spike_rolling_window: 50
  spike_min_history: 20
  rollback_val_ppl_multiplier: 2.0
  rollback_patience_evals: 3
  max_rollbacks: 5

eval:
  eval_interval_steps: 188
  eval_batches: 50

run:
  run_name: gpt2-small-openwebtext-T1280
  seed: 0
  output_dir: output
  results_dir: results
  device: cuda
  dtype: bfloat16
  log_interval_steps: 20
  resume: true
  compile: true
